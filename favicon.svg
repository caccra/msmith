<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- M-Smith Advocates favicon: S + wall-mounted scales + A -->

  <!-- S -->
  <text x="5" y="72" font-family="Georgia,'Times New Roman',serif"
        font-size="56" font-weight="700" fill="#8B1515">S</text>

  <!-- Wall-mounted scales: vertical post -->
  <rect x="47" y="16" width="4" height="54" rx="1.5" fill="#8B1515"/>
  <!-- Decorative cap at top of post -->
  <rect x="44.5" y="14" width="9" height="5" rx="2" fill="#8B1515"/>

  <!-- Horizontal bracket arm curving right -->
  <path d="M49 22 Q53 16 62 19 Q68 21 68 26"
        stroke="#8B1515" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Scroll/flourish at bracket tip -->
  <circle cx="68" cy="28" r="3" fill="#8B1515"/>

  <!-- Hanging hook -->
  <path d="M67 31 Q65 34 66.5 37"
        stroke="#8B1515" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Thin chains to pan -->
  <line x1="60" y1="28" x2="56" y2="50" stroke="#8B1515" stroke-width="1"/>
  <line x1="67" y1="37" x2="70" y2="50" stroke="#8B1515" stroke-width="1"/>

  <!-- Pan bowl -->
  <path d="M53 50 Q63 58 73 50" stroke="#8B1515" stroke-width="2.5"
        fill="#8B1515" stroke-linecap="round"/>

  <!-- Post base foot -->
  <ellipse cx="49" cy="70" rx="6" ry="3" fill="#8B1515"/>

  <!-- A -->
  <text x="66" y="72" font-family="Georgia,'Times New Roman',serif"
        font-size="56" font-weight="700" fill="#8B1515">A</text>
</svg>
